<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --dark: #1a1a1a;
    --accent: #e8553a;
    --accent-light: #ff6f4e;
    --bg: #f5f2ed;
    --text: #333;
    --text-light: #666;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 56px 48px;
    max-width: 540px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
    position: relative;
    animation: fadeUp .6s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    animation: scaleIn .4s ease-out .2s both;
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(.5); }
    to { opacity: 1; transform: scale(1); }
  }

  .check-circle svg {
    width: 32px;
    height: 32px;
    stroke: #fff;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    color: var(--dark);
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 16px;
    color: var(--text-light);
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  .divider {
    width: 48px;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    margin: 0 auto 28px;
  }

  .next-steps {
    background: var(--bg);
    border-radius: 10px;
    padding: 20px 24px;
    text-align: left;
    margin-bottom: 28px;
  }

  .next-steps p {
    font-size: 14px;
    color: var(--text-light);
    font-weight: 500;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .next-steps ul {
    list-style: none;
    padding: 0;
  }

  .next-steps li {
    font-size: 15px;
    color: var(--text);
    padding: 6px 0;
    padding-left: 20px;
    position: relative;
    line-height: 1.5;
  }

  .next-steps li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 13px;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }

  .btn {
    display: inline-block;
    background: var(--dark);
    color: #fff;
    text-decoration: none;
    padding: 14px 36px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    transition: background .2s, transform .15s;
  }

  .btn:hover {
    background: var(--accent);
    transform: translateY(-1px);
  }

  .footer-note {
    margin-top: 24px;
    font-size: 13px;
    color: #aaa;
  }

  @media (max-width: 520px) {
    .card { padding: 40px 28px; }
    h1 { font-size: 26px; }
  }
</style>
</head>

  <p class="subtitle">Your enquiry has been received. Our team will review your requirements and get back to you within 24 hours.</p>

  <div class="divider"></div>

  <div class="next-steps">
    <p>What happens next</p>
    <ul>
      <li>Our team reviews your project details</li>
      <li>We'll reach out with a tailored solution</li>
    </ul>
  </div>
